name: Reusable Gitleaks

on:
  workflow_call:
    inputs:
      strict:
        description: Fail the job when leaks are found
        type: boolean
        required: false
        default: true
      scan-mode:
        description: "no-git (working tree / checkout) or git (full history)"
        type: string
        required: false
        default: no-git

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.scan-mode == 'git' && 0 || 1 }}

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Write scan config
        run: |
          cat > .gitleaks-ci.toml <<'EOF'
          title = "FinaticORG CI gitleaks config"

          [extend]
          useDefault = true

          [allowlist]
          description = "Build artifacts, local env files, tests, docs examples, and known CI/fixture false positives"
          paths = [
            '''gitleaks-ci\.toml''',
            '''(^|/)(node_modules|build|dist|\.next|\.vercel|__pycache__|\.venv|venv|\.turbo|\.cache|coverage)(/|$)''',
            '''(^|/)\.env(\..+)?$''',
            '''(^|/)tests?(/|$)''',
            '''(^|/)docs(/|$)''',
            '''(^|/)(content|documentation)(/|$)''',
            '''env-variables-model\.ts$''',
            '''\.pyc$''',
            '''package-lock\.json$''',
            '''yarn\.lock$''',
            '''pnpm-lock\.yaml$''',
            '''uv\.lock$''',
          ]
          regexTarget = "match"
          regexes = [
            '''(?i)example[_-]?token''',
            '''(?i)your[_-]?api[_-]?key''',
            '''(?i)changeme''',
            '''(?i)placeholder''',
            '''xxxx+''',
            '''\$\{\{\s*secrets\.''',
            '''Bearer\s+\$\{''',
            '''os\.environ''',
            '''getenv\(['\"]''',
            '''process\.env''',
            '''(?i)test-secret-key-at-least-32-characters-long''',
            '''(?i)my_secret_token''',
            '''(?i)refresh_token_abc123''',
            '''(?i)device_token_xyz789''',
            '''(?i)trading212_(live|paper|unknown)''',
            '''ttl_seconds\s*=\s*\d+''',
            '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.\.\.''',
            # Known non-production CI Fernet test key (workflows / unit fixtures)
            '''vp8WLd6nIY-0igRsOWoP6YqtvWMw5xYtCUXja3J_Cfg=''',
            # Public Robinhood OAuth client id embedded in their apps
            '''c82SH0WZOsabOXGP2sxqcj34FxkvfnWRZBKlBjFS''',
          ]
          EOF

      - name: Run Gitleaks (working tree)
        if: inputs.scan-mode == 'no-git'
        continue-on-error: ${{ !inputs.strict }}
        run: gitleaks detect --source="." --no-git --redact --verbose --config=.gitleaks-ci.toml

      - name: Run Gitleaks (git history)
        if: inputs.scan-mode == 'git'
        continue-on-error: ${{ !inputs.strict }}
        run: gitleaks detect --source="." --redact --verbose --config=.gitleaks-ci.toml
