name: Reusable pip license check

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: false
        default: "."
      strict:
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  licenses:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync project
        run: |
          if [ -f uv.lock ]; then uv sync --frozen; elif [ -f pyproject.toml ]; then uv sync; elif [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        continue-on-error: true

      - name: License report
        run: |
          pip install pip-licenses
          pip-licenses --format=markdown --with-urls | tee pip-licenses.md
        continue-on-error: ${{ !inputs.strict }}

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-licenses
          path: ${{ inputs.working-directory }}/pip-licenses.md
          if-no-files-found: ignore
