name: CI

on:
  pull_request:
    branches: [develop, staging, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/reusable-actionlint.yml
    with:
      strict: true
