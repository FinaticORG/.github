name: Security

on:
  pull_request:
  push:
    branches: [develop, staging, main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  actionlint:
    uses: ./.github/workflows/reusable-actionlint.yml
    with:
      strict: true

  gitleaks:
    uses: ./.github/workflows/reusable-gitleaks.yml
    with:
      strict: true
      scan-mode: no-git
