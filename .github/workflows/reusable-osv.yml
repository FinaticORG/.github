name: Reusable OSV Scanner

on:
  workflow_call:
    inputs:
      strict:
        description: Fail the job when vulnerabilities are found
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  osv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OSV-Scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.0.3/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner

      - name: Run OSV-Scanner
        run: osv-scanner --recursive ./
        continue-on-error: ${{ !inputs.strict }}
