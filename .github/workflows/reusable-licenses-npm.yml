name: Reusable npm license check

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        required: false
        default: "."
      strict:
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  licenses:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; elif [ -f yarn.lock ]; then yarn install --frozen-lockfile; elif [ -f pnpm-lock.yaml ]; then corepack enable && pnpm install --frozen-lockfile; else npm install; fi

      - name: License summary
        run: npx --yes license-checker --production --summary
        continue-on-error: ${{ !inputs.strict }}
