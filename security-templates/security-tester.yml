name: Security

# Cost controls:
# - PR: actionlint + gitleaks only (cheap)
# - schedule / workflow_dispatch / push to main: + osv, codeql
# - skip dependabot; cancel superseded runs on the same ref
# Note: FinaticTester has no licenses job (no production lockfile install path)

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  actionlint:
    if: github.actor != 'dependabot[bot]'
    uses: FinaticORG/.github/.github/workflows/reusable-actionlint.yml@main
    with:
      strict: true

  gitleaks:
    if: github.actor != 'dependabot[bot]'
    uses: FinaticORG/.github/.github/workflows/reusable-gitleaks.yml@main
    with:
      strict: true
      scan-mode: no-git

  osv:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push')
    uses: FinaticORG/.github/.github/workflows/reusable-osv.yml@main
    with:
      strict: true

  codeql:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push')
    uses: FinaticORG/.github/.github/workflows/reusable-codeql.yml@main
    with:
      languages: '["javascript-typescript"]'
