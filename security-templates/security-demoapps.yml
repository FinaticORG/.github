name: Security

# Cost controls:
# - PR: actionlint + gitleaks only (cheap)
# - schedule / workflow_dispatch only: + osv, licenses, codeql
# - skip dependabot; cancel superseded runs on the same ref

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  actionlint:
    if: github.actor != 'dependabot[bot]'
    uses: FinaticORG/.github/.github/workflows/reusable-actionlint.yml@main
    with:
      strict: true

  gitleaks:
    if: github.actor != 'dependabot[bot]'
    uses: FinaticORG/.github/.github/workflows/reusable-gitleaks.yml@main
    with:
      strict: true
      scan-mode: no-git

  osv:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    uses: FinaticORG/.github/.github/workflows/reusable-osv.yml@main
    with:
      strict: true

  # Mirror client CI layout: file: deps need a sibling Client SDK checkout.
  licenses-npm:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/demo-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: FinaticORG/FinaticClientSDK
          ref: develop
          path: sdks/FinaticClientSDK

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Client SDK
        working-directory: sdks/FinaticClientSDK
        run: npm ci && npm run build

      - name: Configure local SDK path
        run: |
          echo "@finatic/client:file:../../sdks/FinaticClientSDK" > .npmrc
          npm install ../../sdks/FinaticClientSDK --legacy-peer-deps

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: License summary
        run: npx --yes license-checker --production --summary

  codeql:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    uses: FinaticORG/.github/.github/workflows/reusable-codeql.yml@main
    with:
      languages: '["javascript-typescript"]'
